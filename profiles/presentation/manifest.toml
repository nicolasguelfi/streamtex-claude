# profiles/presentation/manifest.toml
# Live projection presentations profile (extends project)

[profile]
name = "presentation"
description = "Live projection presentations (10-20m distance)"
extends = "project"

# Only additions relative to parent profile
# Note: stx-block commands are inherited from project profile.
# The presentation overlay adds skills and agents that the stx-block
# commands detect and use automatically.

[commands]
stx-presentation = ["presentation-audit.md", "presentation-fix.md", "survey-convert.md"]

[skills]
presentation = ["presentation-design-rules.md", "fullscreen-presentation-rules.md", "survey-chart-conversion.md"]

[guidelines]
presentation = ["auditorium-projection.md", "workshop-interactive.md"]

[agents]
presentation = ["presentation-designer.md"]
