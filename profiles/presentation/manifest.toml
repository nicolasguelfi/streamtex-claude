# profiles/presentation/manifest.toml
# Live projection presentations profile (extends project)

[profile]
name = "presentation"
description = "Live projection presentations (10-20m distance)"
extends = "project"

# Only additions relative to parent profile
# Note: stx-designer commands are inherited from project profile.
# The presentation overlay adds skills and agents that the stx-designer
# commands detect and use automatically.

[skills]
designer_ros = ["presentation-design-rules.md", "fullscreen-presentation-rules.md", "survey-chart-conversion.md"]

[agents]
designer_ros = ["presentation-designer.md"]
