# profiles/documentation/manifest.toml
# Manual and documentation authoring profile (Nicolas)

[profile]
name = "documentation"
description = "Manual and documentation authoring"
extends = ""

[commands]
stx-designer = ["slide-new.md", "slide-audit.md", "slide-fix.md", "style-audit.md", "style-refactor.md", "block-new.md", "block-preview.md"]
stx-developer = ["test-run.md", "lint.md"]
stx-project = ["course-generate.md"]
stx-coherence = ["audit.md"]

[skills]
designer = ["slide-design-rules.md", "visual-design-rules.md", "style-conventions.md", "streamtex-quick-reference.md"]
