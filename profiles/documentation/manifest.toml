# profiles/documentation/manifest.toml
# Manual and documentation authoring profile (Nicolas)
# Inherits ALL project commands + shared resources, adds coherence tools

[profile]
name = "documentation"
description = "Manual and documentation authoring"
extends = "project"

# Overlay adds:
#   developer/skills/coherence-checks.md — documentation-specific coherence rules

[commands]
stx-docs = ["release.md"]

[skills]
developer = ["coherence-checks.md"]

[shared]
commands = ["stx-coherence"]
