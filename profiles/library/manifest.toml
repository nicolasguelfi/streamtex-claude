# profiles/library/manifest.toml
# StreamTeX library development profile (Nicolas)
# Inherits ALL project commands + shared resources, adds library-specific tools

[profile]
name = "library"
description = "StreamTeX library development"
extends = "project"

# Overlay adds:
#   commands/stx-developer/deploy.md   — PyPI publication
#   developer/skills/architecture.md   — library architecture overview
#   developer/skills/coherence-checks.md — coherence check rules

[commands]
stx-developer = ["deploy.md"]

[skills]
developer = ["architecture.md", "coherence-checks.md"]

[shared]
commands = ["stx-coherence"]
