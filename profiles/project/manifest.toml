# profiles/project/manifest.toml
# Standard StreamTeX project development profile (Bob)

[profile]
name = "project"
description = "Standard StreamTeX project development"
extends = ""

[commands]
stx-designer = ["init.md", "update.md", "audit.md", "fix.md", "tool.md"]
developer = ["test-run.md", "lint.md"]
project = ["issue.md"]

[skills]
designer = ["slide-design-rules.md", "visual-design-rules.md", "style-conventions.md", "streamtex-quick-reference.md", "block-blueprints.md"]
developer = ["testing-patterns.md", "stx-migrate.md", "docs-lookup.md"]

[agents]
designer = ["slide-designer.md", "slide-reviewer.md", "project-architect.md"]

[templates]
designer = ["project.md", "presentation.md", "collection.md", "course.md"]

[tools]
designer = ["survey-convert.md"]

[shared]
references = ["coding_standards.md", "streamtex_cheatsheet_en.md", "presentation_cheatsheet_en.md"]
commands = ["stx-guide.md"]
